<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Atelier des PES de Français - Niveau 3AS</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
        :root {
            --bleu-hist: #1a3673;
            --vert-debat: #0fa968;
            --orange-appel: #d97706;
            --violet-fant: #8b5cf6;
            --fond: #f8fafc;
            --texte: #1e293b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--fond);
            color: var(--texte);
        }
        header {
            background-color: #041434;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-text h1 { margin: 0; font-size: 1.2rem; }
        .logo-text p { margin: 0; font-size: 0.8rem; color: #94a3b8; }
        
        .hero {
            background: linear-gradient(135deg, #1e3a8a, #0f172a);
            color: white;
            text-align: center;
            padding: 4rem 1rem;
        }
        .hero h2 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        
        .projects-section {
            max-width: 1200px;
            margin: -3rem auto 0;
            padding: 2rem;
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            width: 280px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            cursor: pointer;
        }
        .card:hover { transform: translateY(-5px); }
        .card-header { padding: 2rem 1.5rem; color: white; }
        .card-header h3 { margin: 0 0 0.5rem 0; font-size: 1.4rem; }
        .card-header p { margin: 0; font-size: 0
